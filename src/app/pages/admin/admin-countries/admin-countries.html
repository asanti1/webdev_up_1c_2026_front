<app-header />

<main class="container py-4 py-lg-5">

  <app-admin-page-header title="Países" description="Gestioná los países disponibles para usuarios y destinos."
    buttonLabel="Nuevo país" modalTarget="#countryModal" (createClicked)="openCreateModal()" />

  <section class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">


      @if (countriesResponse().data.length === 0) {

      <app-admin-empty-state title="No se encontraron países"
        description="Creá un nuevo país para comenzar." />

      } @else {

      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>País</th>
              <th>Código ISO</th>
            </tr>
          </thead>

          <tbody>
            @for (country of countriesResponse().data; track country.id) {
            <tr>
              <td class="fw-semibold">
                {{ country.name }}
              </td>

              <td>
                <span class="badge text-bg-light border">
                  {{ country.isoCode }}
                </span>
              </td>
            </tr>
            }
          </tbody>
        </table>
      </div>

      <app-package-pagination [currentPage]="countriesResponse().page" [totalPages]="countriesResponse().totalPages"
        (pageChange)="goToPage($event)" />

      }

    </div>
  </section>

</main>

<div class="modal fade" id="countryModal" tabindex="-1" aria-labelledby="countryModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0">

      <div class="modal-header border-bottom">
        <h2 class="modal-title h5 fw-bold" id="countryModalLabel">
          Nuevo país
        </h2>

        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <form (submit)="saveCountry(); $event.preventDefault()">
        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label">
              Nombre del país
            </label>

            <input type="text" class="form-control" placeholder="Ej: Argentina" [value]="countryForm().name"
              (input)="updateFormField('name', $event)" />
          </div>

          <div class="mb-0">
            <label class="form-label">
              Código ISO
            </label>

            <input type="text" class="form-control text-uppercase" placeholder="Ej: ARG" maxlength="3"
              [value]="countryForm().isoCode" (input)="updateFormField('isoCode', $event)" />

            <div class="form-text">
              Usá el código ISO de 3 letras.
            </div>
          </div>

        </div>

        <div class="modal-footer border-top">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>

          <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">
            Crear país
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

<app-footer />
